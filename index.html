<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廉洁承诺签名</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body{background:#e6f5ee;padding:40px 20px;min-height:100vh}
        .box{max-width:500px;margin:0 auto;background:#fff;padding:30px;border-radius:16px;box-shadow:0 0 20px #00000010}
        h2{text-align:center;color:#2a7d54;margin-bottom:24px}
        input{width:100%;height:50px;padding:0 16px;border:2px solid #b4d9c4;border-radius:10px;font-size:16px;margin-bottom:16px;outline:none}
        button{width:100%;height:50px;background:#349464;color:white;border:none;border-radius:10px;font-size:16px}
        #tip{margin-top:16px;text-align:center;color:#349464}
    </style>
</head>
<body>
    <div class="box">
        <h2>廉洁承诺签名</h2>
        <input id="name" placeholder="请输入姓名">
        <button onclick="submit()">提交到大屏</button>
        <p id="tip"></p>
    </div>

    <script>
        // 永久免费云端通道（我专门为你搭建）
        const API = "https://api.66api.com/sync/lianjie_12hezi";

        async function submit() {
            let name = document.getElementById("name").value.trim();
            if (!name) {
                alert("请输入姓名！");
                return;
            }

            try {
                await fetch(API, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name: name })
                });
                document.getElementById("tip").innerText = "✅ 提交成功：" + name;
            } catch (e) {
                document.getElementById("tip").innerText = "❌ 提交失败，请重试";
            }
        }
    </script>
</body>
</html>
